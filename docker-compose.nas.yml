services:
  backend:
    build: ./backend
    container_name: portfolio-backend
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data:/data
    environment:
      - DATABASE_PATH=/data/portfolio.db
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8010"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/')"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.nas
      args:
        VITE_API_URL: /api
    container_name: portfolio-frontend
    restart: unless-stopped
    network_mode: host
    depends_on:
      backend:
        condition: service_healthy
